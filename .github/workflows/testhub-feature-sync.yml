name: TestHub Feature Sync

on:
  issues:
    types:
      - opened
      - edited
      - closed
      - reopened
      - labeled

jobs:
  sync-feature:
    runs-on: ubuntu-latest

    steps:
      - name: Determine if Feature
        id: feature_check
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.issue.labels.map(l => l.name.toLowerCase());

            if (labels.includes('feature')) {
              core.setOutput('is_feature', 'true');
            } else {
              core.setOutput('is_feature', 'false');
            }

      - name: Skip Non-Feature Issue
        if: steps.feature_check.outputs.is_feature != 'true'
        run: echo "Not a feature. Skipping sync."

      - name: Sync To TestHub
        if: steps.feature_check.outputs.is_feature == 'true'
        run: |
          curl -X POST "https://YOUR_TESTHUB_URL/api/integrations/github/features" \
            -H "Content-Type: application/json" \
            -d '{
              "eventType":"${{ github.event.action }}",
              "organization":"${{ github.repository_owner }}",
              "repository":"${{ github.event.repository.name }}",
              "issueNumber":${{ github.event.issue.number }},
              "title":"${{ github.event.issue.title }}",
              "url":"${{ github.event.issue.html_url }}",
              "state":"${{ github.event.issue.state }}"
            }'

name: TestHub Feature Sync

on:
  issues:
    types:
      - labeled
      - edited
      - closed
      - reopened

jobs:
  sync-feature:
    runs-on: self-hosted

    steps:
      - name: Determine if Issue is a Feature
        id: feature_check
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.issue.labels.map(
              l => l.name.toLowerCase()
            );

            const isFeature = labels.includes('feature');

            console.log('Labels:', labels);
            console.log('Is Feature:', isFeature);

            core.setOutput(
              'is_feature',
              isFeature ? 'true' : 'false'
            );

      - name: Debug Event
        shell: powershell
        run: |
          Write-Host "Action: ${{ github.event.action }}"
          Write-Host "Issue Number: ${{ github.event.issue.number }}"
          Write-Host "Issue Title: ${{ github.event.issue.title }}"
          Write-Host "Feature Check: ${{ steps.feature_check.outputs.is_feature }}"

      - name: Skip Non-Feature Issues
        if: steps.feature_check.outputs.is_feature != 'true'
        shell: powershell
        run: |
          Write-Host "Issue does not contain the 'feature' label."
          exit 0

      - name: Sync Feature To TestHub
        if: steps.feature_check.outputs.is_feature == 'true'
        shell: powershell
        run: |
          $body = @{
            eventType   = "${{ github.event.action }}"
            organization = "${{ github.repository_owner }}"
            repository  = "${{ github.event.repository.name }}"
            issueNumber = ${{ github.event.issue.number }}
            title       = "${{ github.event.issue.title }}"
            url         = "${{ github.event.issue.html_url }}"
            state       = "${{ github.event.issue.state }}"
            labels      = @("${{ github.event.label.name }}")
          } | ConvertTo-Json -Depth 5

          Write-Host "Sending payload to TestHub..."
          Write-Host $body

          try {
              $response = Invoke-RestMethod `
                -Uri "http://localhost:5002/api/integrations/github/features" `
                -Method POST `
                -ContentType "application/json" `
                -Headers @{
                    "X-TestHub-ApiKey" = "th_live_4e8c2f9a1b6d47e3aa90c5f7d2b18e6c"
                } `
                -Body $body

              Write-Host "Response:"
              $response | ConvertTo-Json -Depth 10
          }
          catch {
              Write-Host "Request Failed"
              Write-Host $_.Exception.Message
              throw
          }

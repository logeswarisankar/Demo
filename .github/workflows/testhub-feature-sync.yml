name: TestHub Feature Sync

on:
  issues:
    types:
      - labeled
      - edited
      - closed
      - reopened

jobs:
  sync-feature:
    runs-on: ubuntu-latest

    steps:
      - name: Determine if Issue is a Feature
        id: feature_check
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.issue.labels.map(
              l => l.name.toLowerCase()
            );

            core.setOutput(
              'is_feature',
              labels.includes('feature') ? 'true' : 'false'
            );

      - name: Skip Non-Feature Issues
        if: steps.feature_check.outputs.is_feature != 'true'
        run: echo "Issue does not have feature label. Skipping."

      - name: Sync Feature to TestHub
        if: steps.feature_check.outputs.is_feature == 'true'
        run: |
          curl -X POST "http://localhsot:5002/api/integrations/github/features" \
            -H "Content-Type: application/json" \
            -H "X-TestHub-ApiKey: th_live_4e8c2f9a1b6d47e3aa90c5f7d2b18e6c" \
            -d '{
              "eventType":"${{ github.event.action }}",
              "organization":"${{ github.repository_owner }}",
              "repository":"${{ github.event.repository.name }}",
              "issueNumber":${{ github.event.issue.number }},
              "title":"${{ github.event.issue.title }}",
              "url":"${{ github.event.issue.html_url }}",
              "state":"${{ github.event.issue.state }}"
            }'

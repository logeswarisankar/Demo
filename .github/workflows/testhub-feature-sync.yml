name: TestHub Feature Sync

on:
  issues:
    types:
      - labeled
      - edited
      - closed
      - reopened

jobs:
  sync-feature:
    runs-on: self-hosted

    steps:
      - name: Determine if Issue is a Feature
        id: feature_check
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.issue.labels.map(
              l => l.name.toLowerCase()
            );

            core.setOutput(
              'is_feature',
              labels.includes('feature') ? 'true' : 'false'
            );

      - name: Skip Non-Feature Issues
        if: steps.feature_check.outputs.is_feature != 'true'
        shell: pwsh
        run: |
          Write-Host "Issue does not have feature label. Skipping."

      - name: Verify TestHub API
        if: steps.feature_check.outputs.is_feature == 'true'
        shell: pwsh
        run: |
          Test-NetConnection localhost -Port 5002

      - name: Sync Feature to TestHub
        if: steps.feature_check.outputs.is_feature == 'true'
        shell: pwsh
        run: |
          $body = @{
            eventType   = "${{ github.event.action }}"
            organization = "${{ github.repository_owner }}"
            repository  = "${{ github.event.repository.name }}"
            issueNumber = ${{ github.event.issue.number }}
            title       = "${{ github.event.issue.title }}"
            url         = "${{ github.event.issue.html_url }}"
            state       = "${{ github.event.issue.state }}"
          } | ConvertTo-Json

          Write-Host "Payload:"
          Write-Host $body

          $response = Invoke-RestMethod `
            -Uri "http://localhost:5002/api/integrations/github/features" `
            -Method Post `
            -ContentType "application/json" `
            -Headers @{
              "X-TestHub-ApiKey" = "th_live_4e8c2f9a1b6d47e3aa90c5f7d2b18e6c"
            } `
            -Body $body

          Write-Host "Response:"
          Write-Host ($response | ConvertTo-Json -Depth 5)
